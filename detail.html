<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>HUI</title>
	<link rel="stylesheet" type="text/css" href="./hui/css/hui.css" />
	<style type="text/css">
		body {background: #FFF;}
		.line {height: 20px;}
		.content-ctl {display:flex;padding: 10px;}
		.content-ctl a.hui-button {margin:0 5px 0 5px;}
	</style>
</head>

<body>
	<header class="hui-header">
		<div id="hui-back"></div>
		<h1>武炼巅峰 - 第一百章 你好骚哦</h1>
		<div id="hui-header-menu"></div>
	</header>
	<div class="hui-wrap">
		<div class="hui-center-title">
			<h1>第一百章 你好骚哦</h1>
		</div>
		<div class="hui-content" style="padding:10px;">
			<p>是啊，春风十里不及你。后来，你们单位的事太多，我陪着你回到了你的宿舍。</p>
			<p>使用P标记会缩进！你的宿舍简单到只有一张床一套沙发和一个衣柜。我说，你这是一箪食一瓢饮的颜回，你点头，我就喜欢这样安静的生活，人不堪其忧，我也不改其乐。</p>
		</div>
		<div class="content-ctl">
			<a href="#" class="hui-button hui-button-small hui-primary hui-button-large">上一章</a>
			<a href="#" class="hui-button hui-button-small hui-primary hui-button-large">目录</a>
			<a href="#" class="hui-button hui-button-small hui-primary hui-button-large">下一章</a>
		</div>
	</div>
	<script src="./hui/js/hui.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		var menus = ['我的书单', '我的消息', '我的收藏', '退出登录'];
		var cancel = '关闭菜单';
		hui('#hui-header-menu').click(function () {
			hui.actionSheet(menus, cancel, function (e) {
				console.log(e.index);
				hui.toast(e.innerHTML);
			});
		});
	</script>
</body>
</html>
