<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>用户登录</title>
	<link rel="stylesheet" type="text/css" href="./hui/css/hui.css" />
</head>

<body style="background:#F4F5F6;">
	<header class="hui-header">
		<div id="hui-back"></div>
		<h1>用户登录</h1>
		<div id="hui-header-menu"></div>
	</header>
	<div class="hui-wrap">
		<div class="hui-center-title" style="margin-top:35px;">
			<h1 style="border:0px;">沧海一声笑</h1>
		</div>
		<div style="margin:20px 10px; margin-bottom:15px;" class="hui-form" id="form1">
			<div class="hui-form-items">
				<div class="hui-form-items-title">用户名</div>
				<input type="text" class="hui-input hui-input-clear" checkType="string" checkData="5,20" checkMsg="用户名应为5-20个字符" />
			</div>
			<div class="hui-form-items">
				<div class="hui-form-items-title">密&nbsp;&nbsp;&nbsp;码</div>
				<input type="password" class="hui-input hui-pwd-eye" checkType="string" id="pwd" checkData="6,20" checkMsg="密码应为6-20个字符" />
			</div>
			<div class="hui-form-items">
				<div class="hui-form-items-title">验证码</div>
				<input type="number" class="hui-input" name="yzm" value="" checkType="reg" checkData="^\d{4,4}$" checkMsg="验证码应该为4个数字" />
				<div style="width:120px;">
					<img src="../img/yzm.png" width="100%" />
				</div>
			</div>
		</div>
		<div style="padding:10px;">
			<button type="button" class="hui-button hui-button-large hui-primary" id="submit">立即登录</button>
		</div>
	</div>
	<script type="text/javascript" src="./hui/js/hui.js" charset="UTF-8"></script>
	<script type="text/javascript" src="./hui/js/hui-form.js" charset="utf-8"></script>
	<script type="text/javascript">
		hui('#submit').click(function () {
			//验证
			var res = huiFormCheck('#form1');
			//提交
			if (res) { hui.iconToast('验证通过！'); }
		});
	</script>
</body>
</html>
