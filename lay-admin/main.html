<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>管理后台</title>
	<link rel="stylesheet" href="../layui/css/layui.css">
	<style type="text/css">
		.layui-layout-admin .layui-body {bottom:0;}
		.layui-body {overflow:hidden;min-width:600px;}
		.layui-body-left0 {left:0;}
		#main-frame {width:100%;height:100%;border:0;}
	</style>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">
	<div class="layui-header">
		<div class="layui-logo">XXX系统</div>
		<ul class="layui-nav layui-layout-left">
			<li class="layui-nav-item"><i id="left-menu-ctrl" class="layui-icon layui-icon-shrink-right" style="font-size:20px;"></i></li>
			<li class="layui-nav-item">
				<a href="javascript:;">其它系统</a>
				<dl class="layui-nav-child">
					<dd><a href="javascript:;">邮件管理</a></dd>
					<dd><a href="javascript:;">消息管理</a></dd>
					<dd><a href="javascript:;">授权管理</a></dd>
				</dl>
			</li>
		</ul>
		<ul class="layui-nav layui-layout-right">
			<li class="layui-nav-item"><i class="layui-icon layui-icon-logout" style="font-size:20px;"></i></li>
		</ul>
	</div>

	<div id="layui-side" class="layui-side layui-bg-black">
		<div class="layui-side-scroll">
			<ul class="layui-nav layui-nav-tree" lay-filter="leftMenu">
				<li class="layui-nav-item layui-nav-itemed">
					<a class="" href="javascript:;">所有商品</a>
					<dl class="layui-nav-child">
						<dd><a target="main-frame" href="table.html">列表一</a></dd>
						<dd><a target="main-frame" href="http://www.bilibili.com">列表二</a></dd>
						<dd><a href="javascript:;">列表三</a></dd>
						<dd><a href="javascript:;">超链接</a></dd>
					</dl>
				</li>
				<li class="layui-nav-item">
					<a href="javascript:;">解决方案</a>
					<dl class="layui-nav-child">
						<dd><a href="javascript:;">列表一</a></dd>
						<dd><a href="javascript:;">列表二</a></dd>
						<dd><a href="javascript:;">超链接</a></dd>
					</dl>
				</li>
				<li class="layui-nav-item"><a href="javascript:;">云市场</a></li>
				<li class="layui-nav-item"><a href="javascript:;">发布商品</a></li>
			</ul>
		</div>
	</div>

	<div id="layui-body" class="layui-body">
		<iframe id="main-frame" name="main-frame" src="form.html" width="" height=""></iframe>
	</div>
</div>

<script type="text/javascript" src="../layui/layui.js"></script>
<script type="text/javascript">
layui.use('element', function(){
	var element = layui.element,
	$ = layui.jquery;

	// 左栏菜单显示/隐藏控制按钮
	$('#left-menu-ctrl').click(function(){
		var that = $(this);
		$('#layui-side').toggle();
		if (that.hasClass('layui-icon-shrink-right')) {
			$('#layui-body').addClass('layui-body-left0');
			that.addClass('layui-icon-spread-left').removeClass('layui-icon-shrink-right');
		} else {
			$('#layui-body').removeClass('layui-body-left0');
			that.addClass('layui-icon-shrink-right').removeClass('layui-icon-spread-left');
		}
	});
	
	// 左栏菜单点击事件
	element.on('nav(leftMenu)', function(obj){
		
	});
});
</script>
</body>
</html>
